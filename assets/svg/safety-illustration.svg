<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="safety-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="check-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#4ADE80" />
    </linearGradient>
  </defs>

  <!-- Glowing background -->
  <circle cx="200" cy="200" r="160" fill="url(#safety-glow)" />

  <!-- Shield concentric circles -->
  <circle cx="200" cy="200" r="130" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="6 6" />
  <circle cx="200" cy="200" r="110" stroke="#2563EB" stroke-width="1.5" opacity="0.3" />

  <!-- Safe Location Pin -->
  <g transform="translate(0, -10)">
    <!-- Shield -->
    <path d="M200 80c40 0 80-15 80-15v75c0 55-35 95-80 110-45-15-80-55-80-110V65s40 15 80 15z" fill="url(#shield-grad)" />
    
    <!-- White Checkmark Circle -->
    <circle cx="200" cy="145" r="35" fill="#FFF" />
    
    <!-- Checkmark -->
    <path d="M185 145l10 10 20-20" stroke="url(#check-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Surrounding safe stars/dots -->
  <circle cx="90" cy="120" r="4" fill="#22C55E" />
  <circle cx="310" cy="120" r="5" fill="#2563EB" opacity="0.6" />
  <circle cx="100" cy="280" r="5" fill="#2563EB" />
  <circle cx="300" cy="280" r="4" fill="#22C55E" opacity="0.7" />
</svg>
