<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="about-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="primary-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Glowing Background -->
  <circle cx="200" cy="200" r="180" fill="url(#about-glow)" />

  <!-- Connecting Nodes (Abstract Network Map) -->
  <path d="M100 280 L200 120 L300 280 Z" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4" />
  <path d="M100 280 L200 250 L300 280" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4" />
  <path d="M200 120 L200 250" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Network Circles -->
  <circle cx="200" cy="120" r="45" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.3" />
  <circle cx="100" cy="280" r="35" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.3" />
  <circle cx="300" cy="280" r="35" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.3" />

  <!-- Central Hub / Connection Pin -->
  <g transform="translate(0, -10)">
    <!-- Main Center Icon (Globe/Connectivity) -->
    <circle cx="200" cy="130" r="28" fill="url(#primary-grad)" />
    <!-- Small inner details representing a stylized "G" or network node -->
    <path d="M190 130a10 10 0 1 1 10 10h-10z" stroke="#FFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Driver / Service Node -->
  <g transform="translate(-10, 0)">
    <circle cx="110" cy="280" r="22" fill="url(#accent-grad)" />
    <!-- Stylized Checkmark/Car Shape inside node -->
    <path d="M102 280l5 5 10-10" stroke="#FFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Destination Node -->
  <g transform="translate(10, 0)">
    <circle cx="290" cy="280" r="22" fill="url(#primary-grad)" />
    <!-- Stylized Location Pin inside node -->
    <path d="M290 270c-5 0-9 4-9 9 0 6 9 12 9 12s9-6 9-12c0-5-4-9-9-9z" fill="#FFF" />
    <circle cx="290" cy="279" r="3" fill="#2563EB" />
  </g>

  <!-- Floating Dots (Data Streams) -->
  <circle cx="150" cy="200" r="5" fill="#2563EB" />
  <circle cx="250" cy="200" r="6" fill="#10B981" />
  <circle cx="200" cy="250" r="8" fill="#2563EB" opacity="0.6" />
</svg>
