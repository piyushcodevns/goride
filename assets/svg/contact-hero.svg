<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="contact-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bubble-grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="bubble-grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Glowing Background -->
  <circle cx="200" cy="200" r="180" fill="url(#contact-glow)" />

  <!-- Support Headset Graphic Outline -->
  <circle cx="200" cy="200" r="80" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="6 6" />

  <!-- Main Speech Bubble Blue (Left) -->
  <g>
    <path d="M110 130 h100 c11 0 20 9 20 20 v40 c0 11-9 20-20 20 h-80 l-25 25 v-25 c-11 0-20-9-20-20 v-40 c0-11 9-20 20-20z" fill="url(#bubble-grad1)" />
    <!-- Speech bubble internal lines representing text -->
    <rect x="115" y="150" width="70" height="4" rx="2" fill="#FFF" opacity="0.9" />
    <rect x="115" y="162" width="50" height="4" rx="2" fill="#FFF" opacity="0.9" />
    <rect x="115" y="174" width="60" height="4" rx="2" fill="#FFF" opacity="0.7" />
  </g>

  <!-- Secondary Speech Bubble Green (Right) -->
  <g>
    <path d="M280 180 h-90 c-11 0-20 9-20 20 v30 c0 11 9 20 20 20 h70 l20 20 v-20 c11 0 20-9 20-20 v-30 c0-11-9-20-20-20z" fill="url(#bubble-grad2)" />
    <!-- Speech bubble internal lines -->
    <rect x="190" y="200" width="60" height="4" rx="2" fill="#FFF" opacity="0.9" />
    <rect x="190" y="212" width="40" height="4" rx="2" fill="#FFF" opacity="0.9" />
  </g>

  <!-- Support Icon Circles (Email, Phone, Map) -->
  <g transform="translate(60, 80)">
    <circle cx="20" cy="20" r="20" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5" />
    <circle cx="20" cy="20" r="10" stroke="#2563EB" stroke-width="2" fill="none" />
    <path d="M20 15v5l3 3" stroke="#2563EB" stroke-width="2" stroke-linecap="round" fill="none" />
  </g>

  <g transform="translate(300, 100)">
    <circle cx="20" cy="20" r="20" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5" />
    <path d="M20 10c-5 0-9 4-9 9 0 6 9 12 9 12s9-6 9-12c0-5-4-9-9-9z" fill="#10B981" />
    <circle cx="20" cy="19" r="3" fill="#FFF" />
  </g>

  <g transform="translate(260, 290)">
    <circle cx="20" cy="20" r="20" fill="#FFF" stroke="#E5E7EB" stroke-width="1.5" />
    <rect x="11" y="14" width="18" height="12" rx="2" stroke="#2563EB" stroke-width="2" fill="none" />
    <path d="M12 15l8 5 8-5" stroke="#2563EB" stroke-width="2" fill="none" />
  </g>
</svg>
